<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPLICING - 像素解谜之旅</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            transition: all 1s ease;
            overflow-x: hidden;
        }
        
        /* 渐进式颜色主题 - 背景图片 */
        body.stage-0 { 
            background: #000000;
            color: #ffffff;
        }
        body.stage-1 { 
            background: url('assets/backgrounds/stage1.jpg') center/cover no-repeat fixed;
            color: #ffffff;
        }
        body.stage-2 { 
            background: url('assets/backgrounds/stage2.jpg') center/cover no-repeat fixed;
            color: #ecf0f1;
        }
        body.stage-3 { 
            background: url('assets/backgrounds/stage3.jpg') center/cover no-repeat fixed;
            color: #ffffff;
        }
        
        /* 像素波浪边框 */
        .pixel-wave {
            height: 40px;
            background: currentColor;
            clip-path: polygon(
                0 50%, 2% 45%, 4% 40%, 6% 45%, 8% 50%, 10% 45%, 12% 40%, 14% 45%, 16% 50%,
                18% 45%, 20% 40%, 22% 45%, 24% 50%, 26% 45%, 28% 40%, 30% 45%, 32% 50%,
                34% 45%, 36% 40%, 38% 45%, 40% 50%, 42% 45%, 44% 40%, 46% 45%, 48% 50%,
                50% 45%, 52% 40%, 54% 45%, 56% 50%, 58% 45%, 60% 40%, 62% 45%, 64% 50%,
                66% 45%, 68% 40%, 70% 45%, 72% 50%, 74% 45%, 76% 40%, 78% 45%, 80% 50%,
                82% 45%, 84% 40%, 86% 45%, 88% 50%, 90% 45%, 92% 40%, 94% 45%, 96% 50%,
                98% 45%, 100% 40%, 100% 100%, 0 100%
            );
            opacity: 0.3;
        }
        
        /* 主标题区 */
        .hero {
            padding: 80px 40px 60px;
            text-align: center;
        }
        
        .main-title {
            font-size: 64px;
            letter-spacing: 8px;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px currentColor; }
            to { text-shadow: 0 0 25px currentColor, 0 0 40px currentColor; }
        }
        
        .main-subtitle {
            font-size: 14px;
            letter-spacing: 3px;
            opacity: 0.9;
        }
        
        /* Desktop标签 */
        .desktop-label {
            text-align: center;
            font-size: 20px;
            margin: 40px 0;
            opacity: 0.8;
        }
        
        /* 主内容区 - 白色桌面 */
        .desktop-area {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            padding: 60px 50px;
            box-shadow: 0 -10px 50px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        
        body.stage-0 .desktop-area { background: #f5f5f5; color: #000; }
        body.stage-1 .desktop-area { background: #f5f5f5; color: #000; }
        body.stage-2 .desktop-area { background: #f5f5f5; color: #000; }
        body.stage-3 .desktop-area { background: #ffffff; color: #000; }
        
        /* 密钥输入区 */
        .key-section {
            background: rgba(0, 0, 0, 0.05);
            padding: 40px;
            margin-bottom: 50px;
            border: 3px solid #000;
            text-align: center;
        }
        
        .key-section h3 {
            font-size: 14px;
            margin-bottom: 25px;
            color: #000;
        }
        
        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .key-input {
            width: 220px;
            padding: 18px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            text-align: center;
            border: 3px solid #000;
            background: #fff;
            color: #000;
        }
        
        .submit-btn {
            padding: 18px 35px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        body.stage-3 .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .submit-btn:hover {
            transform: scale(1.05);
        }
        
        .msg {
            margin-top: 20px;
            font-size: 11px;
            min-height: 25px;
            color: #000;
        }
        
        /* 统计数据区 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin: 60px 0;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 48px;
            margin-bottom: 10px;
            color: #000;
        }
        
        body.stage-3 .stat-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 10px;
            opacity: 0.7;
            color: #000;
        }
        
        /* WHO WE ARE 标题 */
        .section-title {
            font-size: 36px;
            text-align: center;
            margin: 60px 0 40px;
            letter-spacing: 4px;
            color: #000;
        }
        
        /* 关卡卡片网格 */
        .levels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
            margin-bottom: 60px;
        }
        
        .level-card {
            background: #fff;
            border: 4px solid #000;
            padding: 35px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
        }
        
        body.stage-0 .level-card { background: #e0e0e0; }
        body.stage-1 .level-card { background: #e8e8e8; }
        body.stage-2 .level-card { background: #f0f0f0; }
        
        .level-card:hover {
            transform: translateY(-5px);
            box-shadow: 8px 8px 0 #000;
        }
        
        .level-num {
            font-size: 42px;
            margin-bottom: 15px;
            color: #000;
        }
        
        .level-title {
            font-size: 16px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #000;
        }
        
        .level-desc {
            font-size: 9px;
            line-height: 1.8;
            margin-bottom: 25px;
            opacity: 0.7;
            color: #000;
        }
        
        .play-btn {
            display: inline-block;
            padding: 15px 30px;
            background: #000;
            color: #fff;
            text-decoration: none;
            font-size: 11px;
            transition: all 0.3s;
            font-family: 'Press Start 2P', monospace;
        }
        
        body.stage-3 .play-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .play-btn:hover {
            transform: scale(1.05);
        }
        
        .key-hint {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.05);
            font-size: 8px;
            border-left: 4px solid #000;
            text-align: left;
            color: #000;
        }
        
        body.stage-3 .key-hint {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-left-color: #667eea;
        }
        
        /* 侧边栏 - 进度查看器 */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            overflow-y: auto;
        }
        
        .sidebar h3 {
            font-size: 11px;
            margin-bottom: 30px;
            color: #fff;
            text-align: center;
            line-height: 1.6;
        }
        
        .stage-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .stage-btn {
            padding: 15px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        
        .stage-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }
        
        .stage-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }
        
        @media (max-width: 768px) {
            .main-title { font-size: 36px; }
            .desktop-area { padding: 40px 25px; }
            .stats-grid { grid-template-columns: 1fr; gap: 30px; }
            .levels-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="stage-0">
    <div class="pixel-wave"></div>
    
    <!-- Hero Section -->
    <div class="hero">
        <h1 class="main-title">SPLICING</h1>
        <p class="main-subtitle">PIXEL ART JOURNEY</p>
    </div>
    
    <!-- Desktop Label -->
    <div class="desktop-label">desktop</div>
    
    <!-- 白色桌面区域 -->
    <div class="desktop-area">
        <!-- Key Input Section -->
        <div class="key-section">
            <h3>🔑 ENTER COMPLETION KEY TO UNLOCK</h3>
            <div class="input-group">
                <input type="text" id="keyInput" class="key-input" placeholder="4-DIGIT KEY" maxlength="4">
                <button class="submit-btn" onclick="submit()">SUBMIT</button>
            </div>
            <div class="msg" id="msg"></div>
        </div>
        
        <!-- 统计数据区 -->
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-number">3</div>
                <div class="stat-label">LEVELS</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">∞</div>
                <div class="stat-label">CREATIVITY</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">100%</div>
                <div class="stat-label">PIXEL ART</div>
            </div>
        </div>
        
        <!-- WHO WE ARE 标题 -->
        <div class="section-title">WHO WE ARE?</div>
        
        <!-- Level Cards -->
        <div class="levels-grid" id="levelsContainer"></div>
    </div>
    
    <!-- Sidebar - Stage Viewer (Only visible at 100% completion) -->
    <div class="sidebar" id="sidebar">
        <h3>🎨 REVIEW<br>EVOLUTION<br>HISTORY</h3>
        <div class="stage-buttons">
            <button class="stage-btn" onclick="switchStage(0)">STAGE 0<br>Black & White</button>
            <button class="stage-btn" onclick="switchStage(1)">STAGE 1<br>Grayscale</button>
            <button class="stage-btn" onclick="switchStage(2)">STAGE 2<br>Cool Tone</button>
            <button class="stage-btn" onclick="switchStage(3)">STAGE 3<br>Full Color</button>
        </div>
    </div>

    <script>
        // 密钥映射 - 修正密码：Level 2 密码是 1218，Level 3 密码是 0218
        const KEYS = {
            '1030': 2,  // Level 1 通关密钥 -> 解锁 Level 2
            '1218': 3,  // Level 2 通关密钥 -> 解锁 Level 3 (修正)
            '0218': 4   // Level 3 通关密钥 -> 全部完成 (修正)
        };
        
        const LEVELS = {
            1: { 
                num: '01', 
                title: 'BLACK & WHITE', 
                desc: 'Platform Puzzle | Collect 3 Items',
                url: 'level-1/level1.html'
            },
            2: { 
                num: '02', 
                title: 'COOL COLORS', 
                desc: 'Magic Cat Adventure | Collect 30 Coins',
                url: 'level-2/index.html'
            },
            3: { 
                num: '03', 
                title: 'WARM COLORS', 
                desc: 'Hand Tracking Challenge | Complete Quest',
                url: 'level-3/index.html'
            }
        };
        
        function loadState() {
            // 清除旧版本的localStorage数据，强制重新开始
            const currentVersion = 'v2';
            const savedVersion = localStorage.getItem('splicing_version');
            
            if (savedVersion !== currentVersion) {
                localStorage.removeItem('splicing_state_v1');
                localStorage.setItem('splicing_version', currentVersion);
            }
            
            try {
                const saved = localStorage.getItem('splicing_state_v1');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.stage !== undefined && Array.isArray(parsed.unlocked)) {
                        return parsed;
                    }
                }
            } catch(e) {
                console.log('读取状态失败，使用默认值');
            }
            return { stage: 0, unlocked: [1] };
        }
        
        function saveState(state) {
            localStorage.setItem('splicing_state_v1', JSON.stringify(state));
        }
        
        let state = loadState();
        let viewStage = null; // 用于查看历史阶段
        
        function updateTheme() {
            const displayStage = viewStage !== null ? viewStage : state.stage;
            document.body.className = `stage-${displayStage}`;
        }
        
        function render() {
            if (!state || !Array.isArray(state.unlocked)) {
                state = { stage: 0, unlocked: [1] };
            }
            
            updateTheme();
            
            const container = document.getElementById('levelsContainer');
            let levelsHTML = '';
            
            state.unlocked.forEach(level => {
                const l = LEVELS[level];
                if (l) {
                    levelsHTML += `
                        <div class="level-card">
                            <div class="level-num">${l.num}</div>
                            <div class="level-title">${l.title}</div>
                            <div class="level-desc">${l.desc}</div>
                            <a href="${l.url}" class="play-btn">▶ PLAY</a>
                        </div>
                    `;
                }
            });
            
            container.innerHTML = levelsHTML;
            
            // 显示/隐藏侧边栏（仅在完成所有关卡后显示）
            const sidebar = document.getElementById('sidebar');
            if (state.stage === 3) {
                sidebar.style.display = 'block';
            } else {
                sidebar.style.display = 'none';
            }
            
            // 更新按钮状态
            updateStageButtons();
        }
        
        function switchStage(stage) {
            viewStage = stage;
            updateTheme();
            updateStageButtons();
        }
        
        function updateStageButtons() {
            const buttons = document.querySelectorAll('.stage-btn');
            const currentStage = viewStage !== null ? viewStage : state.stage;
            buttons.forEach((btn, idx) => {
                if (idx === currentStage) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        function submit() {
            const input = document.getElementById('keyInput');
            const msg = document.getElementById('msg');
            const key = input.value.trim();
            
            if (!key) {
                msg.textContent = '❌ Please enter key';
                msg.style.color = '#ff6b6b';
                return;
            }
            
            const unlockLevel = KEYS[key];
            
            if (unlockLevel && !state.unlocked.includes(unlockLevel)) {
                if (unlockLevel === 4) {
                    state.stage = 3;
                    saveState(state);
                    msg.textContent = '🎉 Congratulations! Full color unlocked!';
                    msg.style.color = '#51cf66';
                    setTimeout(() => {
                        render();
                        input.value = '';
                    }, 1000);
                } else {
                    state.unlocked.push(unlockLevel);
                    state.stage = unlockLevel - 1;
                    saveState(state);
                    msg.textContent = `🎉 Level ${unlockLevel} unlocked! World evolving...`;
                    msg.style.color = '#51cf66';
                    setTimeout(() => {
                        render();
                    }, 1000);
                }
            } else if (unlockLevel && state.unlocked.includes(unlockLevel)) {
                msg.textContent = '⚠️ Key already used';
                msg.style.color = '#ffd43b';
                input.value = '';
            } else {
                msg.textContent = '❌ Invalid key';
                msg.style.color = '#ff6b6b';
                input.value = '';
            }
        }
        
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'keyInput') {
                submit();
            }
        });
        
        render();
        
        window.resetGame = function() {
            state = { stage: 0, unlocked: [1] };
            saveState(state);
            render();
            console.log('游戏已重置');
        };
    </script>
</body>
</html>
