<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPLICING - 像素解谜之旅</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 1s ease;
            overflow: hidden;
        }
        
        /* 渐进式颜色主题 */
        body.stage-0 { 
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
        }
        body.stage-1 { 
            background: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 100%);
            color: #ffffff;
        }
        body.stage-2 { 
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: #ecf0f1;
        }
        body.stage-3 { 
            background: linear-gradient(135deg, #ff6b6b 0%, #f06595 50%, #cc5de8 75%, #845ef7 100%);
            color: #ffffff;
        }
        
        #app {
            max-width: 900px;
            width: 90%;
            padding: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid currentColor;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .title {
            font-size: 32px;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 4px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 5px currentColor; }
            to { text-shadow: 0 0 20px currentColor, 0 0 30px currentColor; }
        }
        
        .subtitle {
            text-align: center;
            font-size: 10px;
            margin-bottom: 40px;
            opacity: 0.8;
        }
        
        .input-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            margin-bottom: 40px;
            border: 2px solid currentColor;
            text-align: center;
        }
        
        .input-section h3 {
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .key-input {
            width: 200px;
            padding: 15px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            text-align: center;
            border: 2px solid currentColor;
            background: rgba(0, 0, 0, 0.3);
            color: currentColor;
        }
        
        .key-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .submit-btn {
            padding: 15px 30px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            background: currentColor;
            color: #000;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        body.stage-0 .submit-btn { color: #000; }
        body.stage-1 .submit-btn { color: #000; }
        body.stage-2 .submit-btn { color: #2c3e50; }
        body.stage-3 .submit-btn { color: #fff; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        .submit-btn:hover {
            transform: scale(1.05);
        }
        
        .msg {
            margin-top: 15px;
            font-size: 10px;
            min-height: 20px;
        }
        
        .levels {
            display: grid;
            gap: 25px;
        }
        
        .level {
            padding: 30px;
            border: 2px solid currentColor;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        
        .level:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(10px);
        }
        
        .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .level-num {
            font-size: 36px;
        }
        
        .level-title {
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        .level-desc {
            font-size: 10px;
            margin-bottom: 20px;
            opacity: 0.7;
            line-height: 1.6;
        }
        
        .play-btn {
            display: inline-block;
            padding: 12px 25px;
            background: currentColor;
            color: #000;
            text-decoration: none;
            font-size: 11px;
            transition: all 0.3s;
            border: none;
            font-family: 'Press Start 2P', monospace;
        }
        
        body.stage-0 .play-btn { color: #000; }
        body.stage-1 .play-btn { color: #000; }
        body.stage-2 .play-btn { color: #2c3e50; }
        body.stage-3 .play-btn { 
            color: #fff; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .play-btn:hover {
            transform: scale(1.05);
        }
        
        .key-hint {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 9px;
            border-left: 3px solid currentColor;
        }
        
        body.stage-2 .key-hint,
        body.stage-3 .key-hint {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-left-color: #667eea;
        }
        
        @media (max-width: 768px) {
            #app { padding: 30px 20px; }
            .title { font-size: 24px; }
            .level-header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body class="stage-0">
    <div id="app"></div>

    <script>
        // 密钥映射 - 修正密码：Level 2 密码是 1218，Level 3 密码是 0218
        const KEYS = {
            '1030': 2,  // Level 1 通关密钥 -> 解锁 Level 2
            '1218': 3,  // Level 2 通关密钥 -> 解锁 Level 3 (修正)
            '0218': 4   // Level 3 通关密钥 -> 全部完成 (修正)
        };
        
        const LEVELS = {
            1: { 
                num: '01', 
                title: 'BLACK & WHITE', 
                desc: '平台跳跃解谜 | 收集3个物品',
                url: 'level-1/level1.html',
                keyHint: '🔑 通关密钥: 1030'
            },
            2: { 
                num: '02', 
                title: 'COOL COLORS', 
                desc: '魔法猫咪冒险 | 收集30个金币',
                url: 'level-2/index.html',
                keyHint: '🔑 通关密钥: 1218'
            },
            3: { 
                num: '03', 
                title: 'WARM COLORS', 
                desc: '手势追踪挑战 | 完成收集任务',
                url: 'level-3/index.html',
                keyHint: '🔑 通关密钥: 0218'
            }
        };
        
        function loadState() {
            try {
                const saved = localStorage.getItem('splicing_state_v1');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.stage !== undefined && Array.isArray(parsed.unlocked)) {
                        return parsed;
                    }
                }
            } catch(e) {
                console.log('读取状态失败，使用默认值');
            }
            return { stage: 0, unlocked: [1] };
        }
        
        function saveState(state) {
            localStorage.setItem('splicing_state_v1', JSON.stringify(state));
        }
        
        let state = loadState();
        
        function updateTheme() {
            document.body.className = `stage-${state.stage}`;
        }
        
        function render() {
            if (!state || !Array.isArray(state.unlocked)) {
                state = { stage: 0, unlocked: [1] };
            }
            
            updateTheme();
            
            let levelsHTML = '';
            state.unlocked.forEach(level => {
                const l = LEVELS[level];
                if (l) {
                    const keyHintHTML = l.keyHint ? `<div class="key-hint">${l.keyHint}</div>` : '';
                    
                    levelsHTML += `
                        <div class="level">
                            <div class="level-header">
                                <div class="level-num">${l.num}</div>
                                <div class="level-title">${l.title}</div>
                            </div>
                            <div class="level-desc">${l.desc}</div>
                            <a href="${l.url}" class="play-btn">▶ PLAY GAME</a>
                            ${keyHintHTML}
                        </div>
                    `;
                }
            });
            
            const stageText = ['初始状态 - 黑白世界', '第一阶段 - 灰度觉醒', '第二阶段 - 冷色浸染', '最终形态 - 全彩绽放'][state.stage];
            
            document.getElementById('app').innerHTML = `
                <h1 class="title">SPLICING</h1>
                <div class="subtitle">像素解谜之旅 · ${stageText}</div>
                
                <div class="input-section">
                    <h3>🔑 输入通关密钥解锁新关卡</h3>
                    <div class="input-group">
                        <input type="text" id="keyInput" class="key-input" placeholder="输入4位密钥" maxlength="4">
                        <button class="submit-btn" onclick="submit()">SUBMIT</button>
                    </div>
                    <div class="msg" id="msg"></div>
                </div>
                
                <div class="levels">
                    ${levelsHTML}
                </div>
            `;
        }
        
        function submit() {
            const input = document.getElementById('keyInput');
            const msg = document.getElementById('msg');
            const key = input.value.trim();
            
            if (!key) {
                msg.textContent = '❌ 请输入密钥';
                msg.style.color = '#ff6b6b';
                return;
            }
            
            const unlockLevel = KEYS[key];
            
            if (unlockLevel && !state.unlocked.includes(unlockLevel)) {
                if (unlockLevel === 4) {
                    state.stage = 3;
                    saveState(state);
                    msg.textContent = '🎉 恭喜！已解锁全彩世界！';
                    msg.style.color = '#51cf66';
                    setTimeout(() => {
                        render();
                        input.value = '';
                    }, 1000);
                } else {
                    state.unlocked.push(unlockLevel);
                    state.stage = unlockLevel - 1;
                    saveState(state);
                    msg.textContent = `🎉 成功解锁 Level ${unlockLevel}！世界进化中...`;
                    msg.style.color = '#51cf66';
                    setTimeout(() => {
                        render();
                    }, 1000);
                }
            } else if (unlockLevel && state.unlocked.includes(unlockLevel)) {
                msg.textContent = '⚠️ 该密钥已使用过';
                msg.style.color = '#ffd43b';
                input.value = '';
            } else {
                msg.textContent = '❌ 密钥错误，请重试';
                msg.style.color = '#ff6b6b';
                input.value = '';
            }
        }
        
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'keyInput') {
                submit();
            }
        });
        
        render();
        
        window.resetGame = function() {
            state = { stage: 0, unlocked: [1] };
            saveState(state);
            render();
            console.log('游戏已重置');
        };
    </script>
</body>
</html>
