    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Press Start 2P', monospace;
            background: linear-gradient(180deg, #ff69b4 0%, #ff1493 100%);
            color: #000;
            overflow-x: hidden;
        }
        
        /* Pixel border decoration */
        .pixel-border-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: repeating-linear-gradient(90deg, 
                #fff 0px, #fff 20px, 
                transparent 20px, transparent 25px,
                #fff 25px, #fff 30px,
                transparent 30px, transparent 35px);
            z-index: 1000;
        }
        
        .pixel-border-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-image: 
                repeating-linear-gradient(90deg, #ff1493 0, #ff1493 10px, #ff69b4 10px, #ff69b4 20px),
                repeating-linear-gradient(0deg, #ff1493 0, #ff1493 10px, transparent 10px, transparent 20px);
            z-index: 1000;
        }
        
        /* Hero section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 40px 40px;
            position: relative;
        }
        
        .hero-title {
            font-size: 80px;
            letter-spacing: 8px;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.2);
            animation: glitch 3s infinite;
        }
        
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
        }
        
        .hero-subtitle {
            font-size: 18px;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        
        .cta-button {
            padding: 20px 50px;
            font-size: 16px;
            font-family: 'Press Start 2P', monospace;
            background: #ff1493;
            color: #fff;
            border: 4px solid #000;
            cursor: pointer;
            box-shadow: 6px 6px 0 #000;
            transition: all 0.1s;
            text-decoration: none;
            display: inline-block;
        }
        
        .cta-button:hover {
            background: #ff69b4;
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0 #000;
        }
        
        .cta-button:active {
            transform: translate(6px, 6px);
            box-shadow: 0 0 0 #000;
        }
        
        /* Desktop section - white content area */
        .desktop-section {
            background: #fff;
            border-radius: 30px 30px 0 0;
            margin: 0 auto;
            max-width: 1200px;
            padding: 80px 60px;
            position: relative;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
        }
        
        .desktop-label {
            text-align: center;
            font-size: 24px;
            margin-bottom: 60px;
            letter-spacing: 4px;
        }
        
        /* Levels grid */
        .levels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-bottom: 80px;
        }
        
        .level-card {
            background: #fff;
            border: 4px solid #000;
            padding: 40px;
            text-align: center;
            box-shadow: 8px 8px 0 #ff69b4;
            transition: all 0.3s;
            position: relative;
        }
        
        .level-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0 #ff1493;
        }
        
        .level-card.locked {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .level-num {
            font-size: 48px;
            margin-bottom: 15px;
            color: #ff1493;
        }
        
        .level-title {
            font-size: 18px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .level-desc {
            font-size: 10px;
            line-height: 1.8;
            margin-bottom: 25px;
            opacity: 0.8;
        }
        
        .play-btn {
            padding: 12px 30px;
            font-size: 12px;
            font-family: 'Press Start 2P', monospace;
            background: #ff1493;
            color: #fff;
            border: 3px solid #000;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            text-decoration: none;
            display: inline-block;
        }
        
        .play-btn:hover {
            background: #ff69b4;
        }
        
        .key-hint {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 9px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        /* Key input section */
        .key-section {
            background: #f0f0f0;
            border: 4px solid #000;
            padding: 40px;
            margin-bottom: 60px;
            box-shadow: 8px 8px 0 #ff69b4;
        }
        
        .key-section h3 {
            font-size: 16px;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .key-input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .key-input {
            width: 200px;
            padding: 15px;
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            text-align: center;
            border: 3px solid #000;
            background: #fff;
        }
        
        .key-submit {
            padding: 15px 35px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            background: #ff1493;
            color: #fff;
            border: 3px solid #000;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
        }
        
        .key-submit:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }
        
        .key-message {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            min-height: 30px;
        }
        
        /* Stats section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 80px;
        }
        
        .stat-box {
            text-align: center;
            padding: 30px;
            background: #f9f9f9;
            border: 3px solid #000;
        }
        
        .stat-number {
            font-size: 36px;
            color: #ff1493;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 10px;
            opacity: 0.8;
        }
        
        /* Services section */
        .services-title {
            font-size: 32px;
            text-align: center;
            margin-bottom: 60px;
            letter-spacing: 4px;
        }
        
        /* Pixel decorations */
        .pixel-deco {
            width: 80px;
            height: 80px;
            background: #00ff00;
            clip-path: polygon(
                0 20%, 20% 20%, 20% 0, 40% 0, 40% 20%, 60% 20%, 
                60% 0, 80% 0, 80% 20%, 100% 20%, 100% 40%, 
                80% 40%, 80% 60%, 100% 60%, 100% 80%, 80% 80%, 
                80% 100%, 60% 100%, 60% 80%, 40% 80%, 40% 100%, 
                20% 100%, 20% 80%, 0 80%, 0 60%, 20% 60%, 
                20% 40%, 0 40%
            );
            position: absolute;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        .pixel-deco-1 { top: 50px; left: 50px; }
        .pixel-deco-2 { top: 100px; right: 80px; background: #00ff00; animation-delay: 2s; }
        .pixel-deco-3 { bottom: 150px; left: 100px; background: #00ff00; animation-delay: 4s; }
        
        @media (max-width: 768px) {
            .hero-title { font-size: 40px; }
            .levels-grid { grid-template-columns: 1fr; }
            .stats-section { grid-template-columns: 1fr; }
            .desktop-section { padding: 40px 20px; }
        }
    </style>
</head>

<body style="background: #ffffff; color: #2c3e50;">
    <div id="app"></div>
    
    <script>
        // 密钥映射 - 修正密码：Level 2 密码是 1218，Level 3 密码是 0218
        const KEYS = {
            '1030': 2,  // Level 1 通关密钥 -> 解锁 Level 2
            '1218': 3,  // Level 2 通关密钥 -> 解锁 Level 3 (修正)
            '0218': 4   // Level 3 通关密钥 -> 全部完成 (修正)
        };
        
        const LEVELS = {
            1: { 
                num: '01', 
                title: 'BLACK & WHITE', 
                desc: 'Platform Adventure<br>Collect 3 Items',
                url: 'level-1/level1.html',
                keyHint: '通关密钥: 1030'
            },
            2: { 
                num: '02', 
                title: 'COOL COLORS', 
                desc: 'Magic Cat Journey<br>Collect 30 Coins',
                url: 'level-2/index.html',
                keyHint: '通关密钥: 1218'
            },
            3: { 
                num: '03', 
                title: 'WARM COLORS', 
                desc: 'Hand Tracking Game<br>Complete Challenge',
                url: 'level-3/index.html',
                keyHint: '通关密钥: 0218'
            }
        };
        
        function loadState() {
            try {
                const saved = localStorage.getItem('splicing_state_v1');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    // 确保数据格式正确
                    if (parsed.stage !== undefined && Array.isArray(parsed.unlocked)) {
                        return parsed;
                    }
                }
            } catch(e) {
                console.log('读取状态失败，使用默认值');
            }
            return { stage: 0, unlocked: [1] };
        }
        
        function saveState(state) {
            localStorage.setItem('splicing_state_v1', JSON.stringify(state));
        }
        
        let state = loadState();
        
        function render() {
            const container = document.getElementById('levelsContainer');
            
            if (!state || !Array.isArray(state.unlocked)) {
                state = { stage: 0, unlocked: [1] };
            }
            
            let cards = '';
            state.unlocked.forEach(level => {
                const l = LEVELS[level];
                if (l) {
                    const keyHintHTML = l.keyHint ? `<div class="key-hint">🔑 ${l.keyHint}</div>` : '';
                    
                    cards += `
                        <div class="level-card">
                            <div class="level-num">${l.num}</div>
                            <div class="level-title">${l.title}</div>
                            <div class="level-desc">${l.desc}</div>
                            <a href="${l.url}" class="play-btn">PLAY →</a>
                            ${keyHintHTML}
                        </div>
                    `;
                }
            });
            
            container.innerHTML = cards;
        }
        
        function submit() {
            const input = document.getElementById('keyInput');
            const msg = document.getElementById('msg');
            const key = input.value.trim();
            
            if (!key) {
                msg.textContent = '请输入密钥';
                msg.style.color = '#e74c3c';
                return;
            }
            
            // 检查密钥是否有效
            const unlockLevel = KEYS[key];
            
            if (unlockLevel && !state.unlocked.includes(unlockLevel)) {
                if (unlockLevel === 4) {
                    // 全部完成
                    state.stage = 3;
                    saveState(state);
                    msg.textContent = '🎉 恭喜通关所有关卡！';
                    msg.style.color = '#2ecc71';
                } else {
                    // 解锁新关卡
                    state.unlocked.push(unlockLevel);
                    state.stage = unlockLevel - 1;
                    saveState(state);
                    msg.textContent = `🎉 Level ${unlockLevel} 已解锁！`;
                    msg.style.color = '#2ecc71';
                    setTimeout(() => {
                        render();
                        input.value = '';
                    }, 800);
                }
            } else if (unlockLevel && state.unlocked.includes(unlockLevel)) {
                msg.textContent = '该密钥已使用';
                msg.style.color = '#f39c12';
                input.value = '';
            } else {
                msg.textContent = '❌ 密钥错误';
                msg.style.color = '#e74c3c';
                input.value = '';
            }
        }
        
        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submit();
        });
        
        // Initialize
        render();
        
        // Debug function
        window.resetGame = function() {
            state = { stage: 0, unlocked: [1] };
            saveState(state);
            render();
        };
    </script>
